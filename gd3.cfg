#  BINDS
bind "SPACE" "+jump"
bind "mwheeldown" "+jump"
bind "LEFTARROW" "toggle volume 0 0.1 0.45"
bind "\" "toggleconsole"
bind "`" "toggleconsole"
bind "F11" "+showscores"
bind "v" "+voicerecord"
bind "x" "switchhands"
bind "MOUSE3" "player_ping"

bind "c" "slot10"        # moly
bind "MOUSE4" "slot8"    # humo
bind "MOUSE5" "slot7"    # flash

unbind "f10"
unbind "tab"

# ---------------------------------------------------------
cl_autohelp "0"
cl_radar_scale "0.3"
cl_radar_square_with_scoreboard "0"
cl_use_opens_buy_menu "0"
cl_sanitize_muted_players "0"

fps_max "440"
fps_max_menu "140"

r_fullscreen_gamma "2.0" 
rate "786432"

volume "0.5"

viewmodel_presetpos "3"
viewmodel_fov "68"

closeonbuy "1"
gameinstructor_enable "0"

# --------------------------
clear

